<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAV — SHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050505;
      --text: #ffffff;
      --price: #888888;
      --muted: #444444;
      --letter-spacing: 0.15em;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: var(--letter-spacing);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
      background: var(--bg);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: var(--letter-spacing);
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text);
    }

    .brand-center {
      text-align: center;
    }

    .brand-link {
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .cart-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: var(--letter-spacing);
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    .cart-link:hover {
      color: var(--text);
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 110px 40px 48px;
    }

    .filter-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: var(--letter-spacing);
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 0;
      position: relative;
      transition: color 0.2s ease;
    }

    .filter-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--text);
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }

    .filter-btn:hover {
      color: var(--text);
    }

    .filter-btn.active {
      color: var(--text);
    }

    .filter-btn.active::after {
      transform: scaleX(1);
    }

    /* ── PRODUCT GRID ── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px 40px;
      padding: 0 40px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.25s ease;
    }

    .product-card:hover {
      opacity: 0.8;
    }

    .product-card:hover .product-img {
      transform: scale(1.02);
    }

    .product-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #111;
      margin-bottom: 16px;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .product-name {
      color: var(--text);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: var(--letter-spacing);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .product-price {
      color: var(--price);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: var(--letter-spacing);
    }

    /* ── HIDDEN STATE ── */
    .product-card.hidden {
      display: none;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: var(--letter-spacing);
      text-transform: uppercase;
    }

    /* ── TABLET ── */
    @media (max-width: 900px) {
      header {
        padding: 18px 24px;
      }

      .filter-bar {
        padding: 96px 24px 40px;
        gap: 24px;
      }

      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 36px 28px;
        padding: 0 24px 60px;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 540px) {
      header {
        padding: 16px 20px;
        grid-template-columns: 1fr auto 1fr;
      }

      .back-link {
        font-size: 9px;
      }

      .cart-link {
        font-size: 9px;
      }

      .brand-link {
        font-size: 12px;
      }

      .filter-bar {
        padding: 88px 20px 36px;
        gap: 20px;
        flex-wrap: wrap;
      }

      .shop-grid {
        grid-template-columns: 1fr;
        gap: 40px 0;
        padding: 0 20px 60px;
        max-width: 420px;
      }

      .product-img-wrap {
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <a href="index.html" class="back-link">← BACK</a>
    </div>
    <div class="brand-center">
      <a href="index.html" class="brand-link">
        <img src="logo.png" alt="The Road For Cav McKnigh" style="height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 0 10px rgba(240,200,80,0.2));" />
      </a>
    </div>
    <div class="header-right">
      <a href="#" class="cart-link">CART 0</a>
    </div>
  </header>

  <!-- FILTER TABS -->
  <nav class="filter-bar" role="navigation" aria-label="Product filters">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="tee">TEE</button>
    <button class="filter-btn" data-filter="hoodie">HOODIE</button>
    <button class="filter-btn" data-filter="sneaker">SNEAKER</button>
  </nav>

  <!-- PRODUCT GRID -->
  <main>
    <div class="shop-grid" id="shop-grid">

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="The Road For Cav McKnigh Tee" loading="eager" style="object-fit:contain;" />
        </div>
        <div class="product-name">THE ROAD FOR CAV TEE</div>
        <div class="product-price">$55</div>
      </a>

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="Fragment 07I Tee" loading="lazy" style="object-fit:contain;" />
        </div>
        <div class="product-name">FRAGMENT 07I TEE</div>
        <div class="product-price">$55</div>
      </a>

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="Lost Signal Tee" loading="lazy" style="object-fit:contain;" />
        </div>
        <div class="product-name">LOST SIGNAL TEE</div>
        <div class="product-price">$55</div>
      </a>

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="02:17 AM Tee" loading="lazy" style="object-fit:contain;" />
        </div>
        <div class="product-name">02:17 AM TEE</div>
        <div class="product-price">$55</div>
      </a>

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="Paris Lat 48 Tee" loading="lazy" style="object-fit:contain;" />
        </div>
        <div class="product-name">PARIS LAT 48 TEE</div>
        <div class="product-price">$65</div>
      </a>

      <a href="#" class="product-card" data-category="tee">
        <div class="product-img-wrap" style="background:#111;">
          <img class="product-img" src="tshirt.png" alt="Cav McKnigh Status Tee" loading="lazy" style="object-fit:contain;" />
        </div>
        <div class="product-name">STATUS: LOST SIGNAL TEE</div>
        <div class="product-price">$65</div>
      </a>

      <div class="empty-state" id="empty-state">NO PRODUCTS FOUND</div>

    </div>
  </main>

  <script>
    (function () {
      const filterBtns = document.querySelectorAll('.filter-btn');
      const cards = document.querySelectorAll('.product-card');
      const emptyState = document.getElementById('empty-state');

      function applyFilter(filter) {
        let visibleCount = 0;

        cards.forEach(function (card) {
          const category = card.getAttribute('data-category');
          const matches = filter === 'all' || category === filter;
          if (matches) {
            card.classList.remove('hidden');
            visibleCount++;
          } else {
            card.classList.add('hidden');
          }
        });

        emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
      }

      filterBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          filterBtns.forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          applyFilter(btn.getAttribute('data-filter'));
        });
      });

      // Cart counter (basic, no persistence — extend as needed)
      var cartCount = 0;
      var cartLink = document.querySelector('.cart-link');

      cards.forEach(function (card) {
        card.addEventListener('click', function (e) {
          e.preventDefault();
          cartCount++;
          cartLink.textContent = 'CART ' + cartCount;
        });
      });
    })();
  </script>

</body>
</html>
